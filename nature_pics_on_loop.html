<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title></title> <!-- Empty title to hide webpage info in tab -->
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden; /* Hide scrollbars */
    background: #111;
    font-family: Arial, sans-serif;
    cursor: pointer;
    -webkit-user-select: none; /* Disable text selection */
    -webkit-touch-callout: none; /* Disable callout on iOS */
    touch-action: manipulation; /* Improve touch responsiveness */
  }

  #imageContainer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
  }

  #currentImage {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
  }

  #myLink {
    display: none;
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,255,255,0.8);
    padding: 8px;
    border-radius: 4px;
    text-decoration: none;
    color: #000;
    font-weight: bold;
    z-index: 3;
  }

  #splitTransition {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    display: flex;
    overflow: hidden;
    z-index: 2;
  }

  #leftHalf, #rightHalf {
    width: 50%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  #leftImage, #rightImage {
    position: absolute;
    top: 0;
    width: 200%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 1s ease;
  }

  #leftImage {
    left: 0;
    clip-path: inset(0 50% 0 0);
  }

  #rightImage {
    right: 0;
    clip-path: inset(0 0 0 50%);
  }

  /* Off-screen positions for animation */
  .off-screen-left {
    transform: translateX(-100%);
  }

  .off-screen-right {
    transform: translateX(100%);
  }
</style>
</head>
<body>

<div id="imageContainer">
  <img id="currentImage" src="" alt="Current" />

  <a id="myLink" href="https://yourwebsite.com" target="_blank">Visit Website</a>

  <div id="splitTransition" style="display: none;">
    <div id="leftHalf">
      <div id="leftImage"></div>
    </div>
    <div id="rightHalf">
      <div id="rightImage"></div>
    </div>
  </div>
</div>

<script>
  const totalImages = 100; 
  const images = [];
  for (let i = 1; i <= totalImages; i++) {
    images.push(`images/photo${i}.jpg`);
  }

  const currentImg = document.getElementById('currentImage');
  const leftImg = document.getElementById('leftImage');
  const rightImg = document.getElementById('rightImage');
  const myLink = document.getElementById('myLink');

  let currentIndex = 0;
  currentImg.src = images[currentIndex];

  currentImg.addEventListener('click', () => {
    if (myLink.style.display === 'none') {
      myLink.style.display = 'block';
    }
  });

  const splitTransition = document.getElementById('splitTransition');

  function startTransition() {
    const nextIndex = (currentIndex + 1) % images.length;
    const nextSrc = images[nextIndex];

    leftImg.style.backgroundImage = `url('${nextSrc}')`;
    rightImg.style.backgroundImage = `url('${nextSrc}')`;

    splitTransition.style.display = 'flex';

    leftImg.classList.add('off-screen-left');
    rightImg.classList.add('off-screen-right');

    // Trigger reflow to restart animation
    void leftImg.offsetWidth;

    leftImg.classList.remove('off-screen-left');
    rightImg.classList.remove('off-screen-right');

    const onTransitionEnd = () => {
      currentImg.src = nextSrc;
      splitTransition.style.display = 'none';

      leftImg.classList.remove('slide-in-left');
      rightImg.classList.remove('slide-in-right');

      leftImg.style.transform = '';
      rightImg.style.transform = '';

      leftImg.removeEventListener('transitionend', onTransitionEnd);
    };

    leftImg.addEventListener('transitionend', onTransitionEnd);
    currentIndex = nextIndex;
  }

  setInterval(startTransition, 10000);

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch((err) => {
        console.warn(`Error attempting to enable fullscreen mode: ${err.message} (${err.name})`);
      });
    } else {
      document.exitFullscreen().catch((err) => {
        console.warn(`Error attempting to exit fullscreen mode: ${err.message} (${err.name})`);
      });
    }
  }

  // Use touchstart for more responsive mobile detection
document.body.addEventListener('click', toggleFullscreen);
document.body.addEventListener('touchend', function(e) {
  e.preventDefault();
  toggleFullscreen();
}, {passive: false});
</script>
</body>
</html>
