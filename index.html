<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="tab-icon.ico" type="image/x-icon" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    /* Basic styles for gallery */
    #gallery { display: flex; flex-wrap: wrap; gap: 10px; }
    #gallery img { max-width: 100%; height: auto; display: block; }
    /* Full-screen styles for desktop view */
    #gallery.fullscreen img { width: 100vw !important; height: 100vh !important; object-fit: contain; }

    /* Styles for header and cascade text */
    .main-header { color: green;font-weight: bold; font-family: "Times New Roman", serif; font-style: italic; text-align: center; font-size: 2em; padding: 0; }
    .cascade-text { display: inline-block; animation: cascadeLoop 12s infinite; }
    .cascade-text span {
      opacity: 0;
      display: inline-block;
      transform: translateY(20px);
      animation: cascadeIn 1.2s forwards;
      --delay: 0s;
      animation-delay: var(--delay);
    }
    @keyframes cascadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes cascadeLoop {
      0%, 99.9% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes rotateOnce {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .rotate-once {
      animation: rotateOnce 2s linear forwards;
      animation-iteration-count: 1;
    }
  </style>
</head>
<body>

<header class="main-header" id="header">
  <span class="cascade-text" id="header-text" style="visibility: hidden;">Gallery of Nature Photos</span>
</header>

<!-- images container -->
<div id="gallery" class="gallery"></div>

<!-- Lightbox elements -->
<div id="lightbox" class="lightbox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:9999;">
  <img id="lightbox-img" src="" alt="Enlarged image" style="max-width:90%; max-height:90%; object-fit:contain;">
  <button class="prev" style="position:absolute; top:50%; left:20px;">Prev</button>
  <button class="next" style="position:absolute; top:50%; right:20px;">Next</button>
</div>

<footer>
  <p class="footer" style="text-align: center;">
    &copy; 2026 Gichuki. All rights reserved.
    <a href="mailto:kenngich@proton.me" style="text-decoration: none !important;">✉️</a> E-mail
  </p>
</footer>

<script>
  // Waits for all images to load or timeout
  async function waitForImagesOrTimeout(images, timeoutMs = 1000) {
    return new Promise((resolve) => {
      let loadedCount = 0;
      const totalImages = images.length;
      if (totalImages === 0) { resolve(); return; }
      const timeoutId = setTimeout(() => { resolve(); }, timeoutMs);
      images.forEach((img) => {
        if (img.complete && img.naturalWidth > 0) {
          loadedCount++;
          if (loadedCount === totalImages) {
            clearTimeout(timeoutId);
            resolve();
          }
        } else {
          img.addEventListener('load', () => {
            loadedCount++;
            if (loadedCount === totalImages) {
              clearTimeout(timeoutId);
              resolve();
            }
          });
        }
      });
    });
  }

  // Load Google Analytics
  function loadGA() {
    const src = "https://www.googletagmanager.com/gtag/js?id=G-22HE9GQ99B";
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-22HE9GQ99B');
  }

  // Check if page was reloaded
  function isPageReloaded() {
    if (performance.getEntriesByType('navigation')[0]) {
      return performance.getEntriesByType('navigation')[0].type === 'reload';
    } else if (performance.navigation) {
      return performance.navigation.type === performance.navigation.type.RELOAD;
    }
    return false;
  }

  // Fetch latest commit SHA from GitHub
  function fetchLatestCommitSha() {
    fetch('https://api.github.com/repos/Gich-lab/Nature-Photos/commits/main')
      .then(response => response.json())
      .then(data => {
        const latestCommitSha = data.sha;
        const storedSha = localStorage.getItem('storedSha');
        const headerText = document.getElementById("header-text");
        const originalText = headerText.textContent;

        // Use session storage to limit multiple writes
        const pageSessionKey = 'pageSessionId';
        if (!sessionStorage.getItem(pageSessionKey)) {
          sessionStorage.setItem(pageSessionKey, 1);
          sendVisitorData();
        }

        if (latestCommitSha === storedSha && isPageReloaded()) {
          headerText.textContent = "Hamna picha mpya";
          triggerCascade(headerText, headerText.textContent, 6, false);
          setTimeout(() => {
            triggerCascade(headerText, originalText);
          }, 8000);
        } else if (latestCommitSha !== storedSha) {
          triggerCascade(headerText, originalText);
          localStorage.setItem('storedSha', latestCommitSha);
          loadGA();
        }

        // Load or update images after page load
        window.addEventListener('load', () => {
          waitForImagesOrTimeout(document.querySelectorAll('img'));
        });
      });
  }

  window.addEventListener('load', fetchLatestCommitSha);

  // Cascade text animation
  function triggerCascade(element, text, totalDuration = 6, loop = true) {
    clearTimeout(element.cascadeTimer);
    function animate() {
      element.style.visibility = "visible";
      element.textContent = "";
      const delayIncrement = totalDuration / text.length;
      for (let i = 0; i < text.length; i++) {
        const span = document.createElement("span");
        span.innerHTML = (text[i] === " ") ? "&nbsp;" : text[i];
        span.style.setProperty("--delay", `${i * delayIncrement}s`);
        element.appendChild(span);
      }
      if (loop) {
        element.cascadeTimer = setTimeout(animate, (totalDuration + 5) * 1000);
      }
    }
    animate();
  }

  // Generate images dynamically
  const gallery = document.getElementById("gallery");
  const maxPhotos = 100;
  for(let i=1; i<=maxPhotos; i++){
    const img = document.createElement("img");
    img.setAttribute('loading', 'lazy');
    img.src = "images/photo"+i+".jpg"; 
    img.setAttribute('width', '1920');
    img.setAttribute('height', '1080');
    img.onerror = function() { this.remove(); }
    gallery.appendChild(img);
  }

  // Lightbox functionality
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");
  let images = document.querySelectorAll("#gallery img");
  let currentIndex = 0;

  function showImage(index){
    currentIndex = index;
    lightboxImg.src = images[index].src;
  }

  // Add click event to images
  images.forEach((img, index) => {
    img.addEventListener("click", () => {
      lightbox.style.display = "flex";
      showImage(index);
    });
  });

  // Navigation
  document.querySelector(".next").onclick = () => {
    currentIndex = (currentIndex + 1) % images.length;
    showImage(currentIndex);
  };
  document.querySelector(".prev").onclick = () => {
    currentIndex = (currentIndex - 1 + images.length) % images.length;
    showImage(currentIndex);
  };

  // Keyboard nav
  document.addEventListener("keydown", (e) => {
    if(lightbox.style.display !== "flex") return;
    if(e.key==="ArrowRight") document.querySelector(".next").click();
    if(e.key==="ArrowLeft") document.querySelector(".prev").click();
    if(e.key==="Escape"){
      lightbox.style.display = "none";
    }
  });

  // Close on background click
  lightbox.addEventListener("click", (e) => {
    if(e.target===lightbox){
      lightbox.style.display = "none";
    }
  });

  // Swipe support
  lightbox.addEventListener("touchstart", (e) => { startX = e.touches[0].clientX; });
  lightbox.addEventListener("touchend", (e) => {
    let endX = e.changedTouches[0].clientX;
    let diff = startX - endX;
    if(diff > 50) document.querySelector(".next").click();
    if(diff < -50) document.querySelector(".prev").click();
  });

  // Device detection functions
  function detectDevice() {
    const ua = navigator.userAgent;
    if(/Mobile|Android|iPhone|iPad|iPod/i.test(ua)) return "Mobile";
    return "Desktop";
  }
  function detectOS() {
    const ua = navigator.userAgent;
    if(ua.indexOf("Win")!==-1) return "Windows";
    if(ua.indexOf("Android")!=-1) return "Android";
    if(ua.indexOf("iPhone")!== -1 || ua.indexOf("iPad") !== -1) return "iOS";
    if(ua.indexOf("Linux")!==-1) return "Linux";  
    if(ua.indexOf("Mac")!==-1) return "MacOS";
    return "Unknown";
  }
  function detectBrowser() {
    const ua = navigator.userAgent;
    if(/Brave/i.test(ua)) return "Brave";
    if(/Chrome/i.test(ua) && !/Edge|OPR/i.test(ua)) return "Chrome";
    if(/Safari/i.test(ua) && !/Chrome/i.test(ua)) return "Safari";
    if(/Firefox/i.test(ua)) return "Firefox";
    if(/Edg/i.test(ua)) return "Edge";
    if(/OPR|Opera/i.test(ua)) return "Opera";
    return "Other";
  }
  function sendVisitorData() {
    const data = {
      time: new Date().toISOString(),
      device: detectDevice(),
      os: detectOS(),
      browser: detectBrowser(),
      screen: window.innerWidth + "x" + document.documentElement.clientHeight,
    };
    fetch("https://script.google.com/macros/s/AKfycbwbn2_iQtpSjj_vGKUgcQMa22hGSY7atHbvcLKspEtuh0fB4Kzetwj8ujUm8kKCfZui", {
      method: "POST",
      body: JSON.stringify(data)
    });
  }

  // Responsive layout
  function updateLayout() {
    const width = window.innerWidth;
    const imgs = document.querySelectorAll("#gallery img");
    const gallery = document.getElementById("gallery");

    // Function to rotate individual images when loading
    function rotateImage(img) {
      // Remove any existing rotation class
      img.classList.remove("rotate");
      void img.offsetWidth; // force reflow to restart animation

      if (img.complete && img.naturalWidth > 0) {
        // If already loaded, animate once
        img.classList.add("rotate");
      } else {
        // When image loads, animate once
        img.addEventListener("load", () => {
          img.classList.remove("rotate");
          void img.offsetWidth; // reflow
          img.classList.add("rotate");
        }, { once: true });
      }
    }

  // Remove 'fullscreen' class and set display styles
  gallery.classList.remove("fullscreen");
  gallery.style.display = "flex";
  gallery.style.flexWrap = "wrap";

  // For each image, apply styles and handle rotation
  imgs.forEach(img => {
    // Reset styles
    img.style.display = "block";
    img.style.height = "auto";
    img.style.margin = "5px";
    img.style.boxShadow = "0 4px 12px rgba(0,0,0,.9)";

    if (width <= 768) {
      img.style.width = "calc(100% - 20px)";
      img.style.borderRadius = "0.3%";
    } else {
      img.style.opacity = "1";
      img.style.width = "calc(25% - 20px)";
      img.style.borderRadius = "0.6%";
    }

    // Trigger individual rotation when images load
    rotateImage(img);
  });

  // Check if all images are already loaded (for page refresh scenario)
  const allLoaded = Array.from(imgs).every(img => img.complete && img.naturalWidth > 0);

  if (allLoaded) {
    // If all images are loaded, rotate all once collectively
    imgs.forEach(img => {
      img.classList.remove("rotate");
      void img.offsetWidth; // reflow to restart
      img.classList.add("rotate");
    });
  }
}
  
  // Initialize layout on load and resize
  window.addEventListener("load", () => {
    updateLayout();
    // Initialize currentIndex for desktop mode
    currentIndex = 0;
  });
  window.addEventListener("resize", updateLayout);
</script>

</body>
</html>
