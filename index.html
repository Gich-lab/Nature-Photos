<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertical Full-Screen Gallery</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>Nature Photo Gallery</header>

<div class="gallery" id="gallery"></div>
<script>
const gallery = document.getElementById("gallery");
fetch("images/")
  .then(response => response.text())
  .then(html => {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const links = doc.querySelectorAll("a");
    links.forEach(link => {
      const href = link.getAttribute("href");
      if (href.match(/\.(jpg|jpeg|png|webp|gif)$/i)) {
        const img = document.createElement("img");
        img.src = "images/" + href.split("/").pop();
        img.loading = "lazy";
        img.alt = "photo";
        gallery.appendChild(img);
      }
    });
  });
</script>
  
<script>
const images = document.querySelectorAll(".gallery img")
const lightbox = document.getElementById("lightbox")
const lightboxImg = document.getElementById("lightbox-img")
let currentIndex = 0
let startX = 0

function showImage(index){
  currentIndex = index
  lightboxImg.src = images[index].src
}

images.forEach((img,index)=>{
  img.addEventListener("click",()=>{
    lightbox.classList.add("active")
    document.body.classList.add("lightbox-open")
    showImage(index)
  })
})

document.querySelector(".next").onclick = ()=>{
  currentIndex = (currentIndex + 1) % images.length
  showImage(currentIndex)
}

document.querySelector(".prev").onclick = ()=>{
  currentIndex = (currentIndex - 1 + images.length) % images.length
  showImage(currentIndex)
}

document.addEventListener("keydown",(e)=>{
  if(!lightbox.classList.contains("active")) return
  if(e.key==="ArrowRight") document.querySelector(".next").click()
  if(e.key==="ArrowLeft") document.querySelector(".prev").click()
  if(e.key==="Escape"){
    lightbox.classList.remove("active")
    document.body.classList.remove("lightbox-open")
  }
})

lightbox.addEventListener("click",(e)=>{
  if(e.target===lightbox){
    lightbox.classList.remove("active")
    document.body.classList.remove("lightbox-open")
  }
})

// swipe support
lightbox.addEventListener("touchstart",(e)=>{ startX = e.touches[0].clientX })
lightbox.addEventListener("touchend",(e)=>{
  let endX = e.changedTouches[0].clientX
  let diff = startX - endX
  if(diff > 50) document.querySelector(".next").click()
  if(diff < -50) document.querySelector(".prev").click()
})
</script>

</body>
</html>
