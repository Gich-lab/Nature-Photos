<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ImageViewer</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #111;
    overflow: hidden;
    font-family: Arial, sans-serif;
    cursor: pointer;
  }

  #imageContainer {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
  }

  #currentImage {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center; /* default position, overridden on mobile */
    z-index: 1;
  }

  #myLink {
    display: none;
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,255,255,0.8);
    padding: 8px;
    border-radius: 4px;
    text-decoration: none;
    color: #000;
    font-weight: bold;
    z-index: 3;
  }

  #splitTransition {
    position: absolute;
    top: 0;
    width: 100%;
    height: 100%;
    display: none;
    overflow: hidden;
    z-index: 2;
  }

  #leftHalf, #rightHalf {
    width: 50%;
    height: 100%;
    overflow: hidden;
    position: relative;
  }

  #leftImage, #rightImage {
    position: absolute;
    top: 0;
    width: 200%;
    height: 100%;
    background-size: cover;
    background-position: center;
    transition: transform 1s ease;
  }

  #leftImage {
    left: 0;
    clip-path: inset(0 50% 0 0);
  }

  #rightImage {
    right: 0;
    clip-path: inset(0 0 0 50%);
  }

  .off-screen-left {
    transform: translateX(-100%);
  }

  .off-screen-right {
    transform: translateX(100%);
  }

  /* Style for the toggle button */
  #fullscreenBtn {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 999;
    padding: 10px 20px;
    border-top-left-radius: 15px;
    border-top-right-radius: 15px;
    border-bottom-left-radius: 15px;
    border-bottom-right-radius: 15px;
    font-size: 16px;
    cursor: pointer;
    color: #07010ee5;
    font-family: Arial, sans-serif;
    font-weight: bold;
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(0, 255, 115, 0.699);
    backdrop-filter: blur(4px);
    transition: background-color 0.3s, border-color 0.3s;
  }

  #fullscreenBtn:hover {
    background: rgba(255, 255, 255, 0.384);
    border-color: #ccc;
  }
</style>
</head>
<body>

<!-- Centered, transparent button -->
<button id="fullscreenBtn">Full screen</button>

<div id="imageContainer">
  <img id="currentImage" src="" alt="Current" />
  <div id="splitTransition" style="display: none;">
    <div id="leftHalf">
      <div id="leftImage"></div>
    </div>
    <div id="rightHalf">
      <div id="rightImage"></div>
    </div>
  </div>
</div>

<script>
  const totalImages = 100;
  const images = [];
  for (let i = 1; i <= totalImages; i++) {
    images.push(`images/photo${i}.jpg`);
  }

  const currentImg = document.getElementById('currentImage');
  const leftImg = document.getElementById('leftImage');
  const rightImg = document.getElementById('rightImage');
  const myLink = document.getElementById('myLink');
  const splitTransition = document.getElementById('splitTransition');
  const toggleBtn = document.getElementById('fullscreenBtn');

  let currentIndex = 0;
  currentImg.src = images[currentIndex];

  currentImg.addEventListener('click', () => {
    if (myLink.style.display === 'none') {
      myLink.style.display = 'block';
    }
  });

  function startTransition() {
    const nextIndex = (currentIndex + 1) % images.length;
    const nextSrc = images[nextIndex];

    leftImg.style.backgroundImage = `url('${nextSrc}')`;
    rightImg.style.backgroundImage = `url('${nextSrc}')`;

    splitTransition.style.display = 'flex';

    leftImg.classList.add('off-screen-left');
    rightImg.classList.add('off-screen-right');

    void leftImg.offsetWidth; // force reflow

    leftImg.classList.remove('off-screen-left');
    rightImg.classList.remove('off-screen-right');

    const onTransitionEnd = () => {
      currentImg.src = nextSrc;
      splitTransition.style.display = 'none';

      leftImg.style.transform = '';
      rightImg.style.transform = '';

      leftImg.removeEventListener('transitionend', onTransitionEnd);
    };

    leftImg.addEventListener('transitionend', onTransitionEnd);
    currentIndex = nextIndex;
  }

  setInterval(startTransition, 10000);

  // Fullscreen toggle on button click
  toggleBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen();
      toggleBtn.textContent = 'Exit';
    } else {
      document.exitFullscreen();
      toggleBtn.textContent = 'Fullscreen';
    }
  });

  // Toggle fullscreen on any key press
  document.addEventListener('keydown', async () => {
    if (!document.fullscreenElement) {
      await document.documentElement.requestFullscreen();
      toggleBtn.textContent = 'Exit';
    } else {
      await document.exitFullscreen();
      toggleBtn.textContent = 'Fullscreen';
    }
  });

  // Function to detect mobile device
  function isMobileDevice() {
    return /Android|iPhone|iPad/i.test(navigator.userAgent);
  }

  // On load, check if mobile and adjust image display
  window.addEventListener('load', () => {
    if (isMobileDevice()) {
      const img = document.getElementById('currentImage');
      // Crop to show top part, fill entire viewport
      img.style.objectFit = 'cover';
      img.style.objectPosition = 'center top'; // show top part
      // Make sure the image fills the screen
      img.style.width = '100vw';
      img.style.height = '100vh';
    }
  });
</script>
</body>
</html>
